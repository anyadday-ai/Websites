<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commercial Cleaning — Crystal Clear</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a href="index.html">Crystal Clear</a>
        <small class="tag">Family-owned by Alex</small>
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <nav class="main-nav">
        <a href="index.html#home">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#testimonials">Testimonials</a>
        <a href="index.html#contact">Contact</a>
      </nav>
      <a href="index.html#contact" class="blue-btn nav-cta">Book Now</a>
    </div>
  </header>

  <main class="container" style="padding:40px 20px">
    <h1>Commercial Cleaning</h1>
    <p>We offer flexible scheduling and discreet service for offices, storefronts, and commercial properties.</p>

    <section id="booking" style="margin-top:24px;max-width:720px">
      <h2>Book Commercial Service</h2>
      <form class="bookingForm">
        <input type="hidden" name="service" value="Commercial">
        <label for="c-name">Name</label>
        <input id="c-name" name="name" required>

        <label for="c-email">Email</label>
        <input id="c-email" name="email" type="email" required>

        <label for="c-date">Preferred Date</label>
        <input id="c-date" name="date" type="date">

        <label for="c-address">Business Address</label>
        <input id="c-address" name="address">

        <label for="c-message">Notes</label>
        <textarea id="c-message" name="message" rows="3"></textarea>

        <button type="submit" class="blue-btn">Request Booking</button>
        <div class="form-msg" aria-live="polite" style="margin-top:10px"></div>
      </form>
      <p style="margin-top:12px"><a href="index.html">Back to home</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span id="year"></span> Crystal Clear — Alex</div>
      <div class="social">
        <a href="#">Instagram</a>
        <a href="#">Facebook</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
